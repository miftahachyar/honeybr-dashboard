<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Akuntansi UMKM — Honeybr Cheesecake (SAK EMKM)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Firebase (compat) untuk cloud database Firestore -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --brand:#b9770e; --brand2:#e3a52a; --green:#16a34a; --red:#dc2626; --blue:#2563eb;
  --amber:#d97706; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
header.top{background:linear-gradient(95deg,#7a4f08,#b9770e);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
header.top .logo{width:42px;height:42px;border-radius:12px;background:#fff3;display:flex;align-items:center;justify-content:center;font-size:22px}
header.top h1{font-size:17px;margin:0;font-weight:700}
header.top .sub{font-size:11.5px;opacity:.9}
header.top .spacer{flex:1}
header.top .period{display:flex;align-items:center;gap:6px;background:#ffffff22;padding:6px 10px;border-radius:8px;font-size:12.5px}
header.top select,header.top input{background:#fff;border:none;border-radius:6px;padding:4px 6px;font-size:12.5px;color:var(--ink)}
header.top button.tool{background:#ffffff22;color:#fff;border:1px solid #ffffff44;border-radius:7px;padding:6px 10px;cursor:pointer;font-size:12px}
header.top button.tool:hover{background:#ffffff35}
nav.tabs{display:flex;gap:2px;background:#fff;padding:0 14px;border-bottom:1px solid var(--line);overflow-x:auto;position:sticky;top:70px;z-index:40}
nav.tabs button{background:none;border:none;padding:13px 16px;cursor:pointer;font-size:13.5px;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;font-weight:500}
nav.tabs button.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700}
nav.tabs button:hover{color:var(--ink)}
main{padding:20px;max-width:1240px;margin:0 auto}
.page{display:none} .page.active{display:block}
h2.title{font-size:18px;margin:0 0 4px} .pageintro{color:var(--muted);font-size:12.5px;margin:0 0 18px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--line);position:relative;overflow:hidden}
.kpi .lab{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.kpi .val{font-size:21px;font-weight:800;margin-top:7px;letter-spacing:-.3px}
.kpi .hint{font-size:11px;color:var(--muted);margin-top:4px}
.kpi .bar{position:absolute;left:0;top:0;bottom:0;width:5px}
.kpi.cash .bar{background:var(--green)} .kpi.recv .bar{background:var(--blue)}
.kpi.pay .bar{background:var(--amber)} .kpi.rev .bar{background:var(--brand)}
.kpi.profit .bar{background:#7c3aed}
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:18px}
.grid2.even{grid-template-columns:1fr 1fr}
@media(max-width:880px){.grid2,.grid2.even{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:14px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:16px}
.card h3{margin:0 0 14px;font-size:14.5px;display:flex;align-items:center;gap:8px}
.card h3 .tag{font-size:10.5px;font-weight:600;background:#fdf3e0;color:var(--brand);padding:2px 8px;border-radius:20px}
table{width:100%;border-collapse:collapse;font-size:12.8px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;background:#fafafa}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tr:hover td{background:#fcfaf6}
.report{font-size:13px;max-width:680px}
.report .row{display:flex;justify-content:space-between;padding:5px 4px;border-bottom:1px dotted #eee}
.report .row.head{font-weight:700;color:var(--brand);border-bottom:2px solid var(--brand);margin-top:14px;text-transform:uppercase;font-size:11.5px;letter-spacing:.5px}
.report .row.sub{font-weight:700;border-bottom:1.5px solid #ccc}
.report .row.total{font-weight:800;font-size:14px;background:#fdf6e9;border-bottom:2px solid var(--brand);margin-top:4px}
.report .row .v{font-variant-numeric:tabular-nums}
.report .row.indent{padding-left:20px}
.pos{color:var(--green)} .neg{color:var(--red)}
form .frow{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
form .fld{flex:1;min-width:150px;display:flex;flex-direction:column;gap:4px}
form label{font-size:11.5px;font-weight:600;color:var(--muted)}
form input,form select,form textarea{padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff}
form input:focus,form select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px #b9770e22}
.btn{background:var(--brand);color:#fff;border:none;padding:10px 18px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600}
.btn:hover{background:#a3680c}
.btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line)} .btn.sec:hover{background:#f3f4f6}
.btn.danger{background:#fff;color:var(--red);border:1px solid #f3c4c4} .btn.danger:hover{background:#fef2f2}
.btn.sm{padding:5px 10px;font-size:11.5px;border-radius:7px}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill.in{background:#dcfce7;color:#15803d} .pill.out{background:#fee2e2;color:#b91c1c}
.pill.prive{background:#ede9fe;color:#6d28d9} .pill.capex{background:#dbeafe;color:#1d4ed8}
.pill.move{background:#f1f5f9;color:#475569} .pill.warn{background:#fef3c7;color:#b45309}
.formtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.formtabs button{padding:8px 14px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted)}
.formtabs button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.subform{display:none} .subform.active{display:block}
.note{background:#fdf6e9;border-left:3px solid var(--brand2);padding:10px 14px;border-radius:0 8px 8px 0;font-size:12px;color:#7a5808;margin-bottom:14px;line-height:1.5}
.note.blue{background:#eff6ff;border-color:var(--blue);color:#1e40af}
.note.red{background:#fef2f2;border-color:var(--red);color:#991b1b}
.balcheck{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:8px;font-weight:600}
.balcheck.ok{background:#dcfce7;color:#15803d} .balcheck.bad{background:#fee2e2;color:#b91c1c}
.jlines{margin:8px 0}
.jline{display:flex;gap:8px;margin-bottom:7px;align-items:center}
.jline select{flex:2} .jline input{flex:1;width:90px}
.miniflag{font-size:11px;color:var(--red);font-weight:600}
.toast{position:fixed;bottom:24px;right:24px;background:#1f2937;color:#fff;padding:13px 18px;border-radius:10px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transform:translateY(12px);transition:.25s;z-index:99}
.toast.show{opacity:1;transform:translateY(0)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:10px}
.legend span{display:flex;align-items:center;gap:5px} .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.bridge .row{display:flex;justify-content:space-between;padding:7px 6px;border-bottom:1px dotted #eee;font-size:12.8px}
.bridge .row.start{font-weight:700;background:#f3f0ff;border-radius:6px}
.bridge .row.end{font-weight:800;background:#dcfce7;border-radius:6px;font-size:13.5px}
.bridge .lab{display:flex;align-items:center;gap:8px}
.bridge .why{font-size:10.5px;color:var(--muted);font-weight:400}
.empty{text-align:center;color:var(--muted);padding:30px;font-size:13px}
.flagrow.bad{background:#fff7ed}
canvas{max-height:260px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat{background:#faf9f7;border-radius:10px;padding:11px 13px;border:1px solid var(--line)}
.stat .l{font-size:11px;color:var(--muted)} .stat .n{font-size:16px;font-weight:800;margin-top:3px}
footer{text-align:center;color:var(--muted);font-size:11px;padding:24px}
</style>
</head>
<body>
<header class="top">
  <div class="logo">🧀</div>
  <div>
    <h1>Dashboard Akuntansi UMKM</h1>
    <div class="sub">Honeybr Cheesecake · Double-entry · SAK EMKM</div>
  </div>
  <div class="spacer"></div>
  <div class="period">
    <span>📅 Periode</span>
    <select id="periodMonth"></select>
    <select id="periodYear"></select>
  </div>
  <span id="cloudStatus" style="display:inline-flex;align-items:center;gap:5px;background:#ffffff22;border:1px solid #ffffff44;border-radius:7px;padding:6px 10px;font-size:12px;color:#fff;margin-right:2px">💾 Lokal</span>
  <button class="tool" onclick="exportJSON()">⬇ Backup</button>
  <button class="tool" onclick="document.getElementById('importFile').click()">⬆ Restore</button>
  <button class="tool" onclick="exportCSV()">📊 Excel</button>
  <button class="tool" onclick="resetSeed()">↺ Reset</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
</header>

<nav class="tabs" id="tabs">
  <button class="active" data-tab="dashboard">📊 Dashboard</button>
  <button data-tab="input">✍️ Input Transaksi</button>
  <button data-tab="jurnal">📒 Jurnal Umum</button>
  <button data-tab="coa">🗂️ Bagan Akun</button>
  <button data-tab="laporan">📑 Laporan SAK EMKM</button>
  <button data-tab="rekon">🔍 Rekonsiliasi & Audit</button>
</nav>

<main>
  <section class="page active" id="page-dashboard"></section>
  <section class="page" id="page-input"></section>
  <section class="page" id="page-jurnal"></section>
  <section class="page" id="page-coa"></section>
  <section class="page" id="page-laporan"></section>
  <section class="page" id="page-rekon"></section>
</main>

<div class="toast" id="toast"></div>
<footer>Dibuat untuk Honeybr Cheesecake · Data tersimpan lokal di browser Anda (localStorage) · Tidak terkirim ke mana pun.</footer>

/* ============================================================

   Diringkas dari sheet "Ringkasan Klasifikasi" (selisih rek. koran = 0).
   Tiap entri sudah balance (Debit = Kredit). Bank operasional = BSI.
   ============================================================ */
function seedJournal(){
  const D='2026-05-31';
  return [
    // Saldo awal kas per 1 Mei 2026 (per bank) → lawan ke Modal/Saldo awal
    {id:'JU-OPEN',date:'2026-04-30',ref:'SALDO-AWAL',desc:'Saldo awal kas per 1 Mei 2026 (posisi tutup 30 Apr, rekening koran)',lines:[

    {id:'JU-S02',date:D,ref:'REKAP-LAIN',desc:'Pendapatan lain-lain (bunga/cashback)',lines:[
      {code:'1-1101',debit:2274.21,credit:0},{code:'4-2100',debit:0,credit:2274.21}],evidence:true},
    // PEMBIAYAAN (bukan pendapatan!)
    {id:'JU-S03',date:D,ref:'REKAP-MODAL',desc:'Setoran modal pemilik (suntikan dana)',lines:[
      {code:'1-1101',debit:62667000,credit:0},{code:'3-1100',debit:0,credit:62667000}],evidence:false,note:'KONFIRMASI: pastikan ini setoran modal, bukan utang/penjualan'},
    {id:'JU-S04',date:D,ref:'REKAP-DEPOSIT',desc:'Terima titipan/deposit oven (utang jaminan)',lines:[
      {code:'1-1101',debit:3345000,credit:0},{code:'2-1400',debit:0,credit:3345000}],evidence:true},
    // HPP
    {id:'JU-S05',date:D,ref:'REKAP-HPP',desc:'Pembelian bahan baku / produk (Beban Pokok Penjualan)',lines:[
      {code:'5-1100',debit:126357613,credit:0},{code:'1-1101',debit:0,credit:126357613}],evidence:false,note:'Sebagian transfer ke pemasok masih ASUMSI — konfirmasi pemasok vs gaji'},
    // CAPEX (mengurangi kas, BUKAN beban di Laba/Rugi)
    {id:'JU-S06',date:D,ref:'REKAP-ASET',desc:'Beli Peralatan - Chiller (aset tetap / capex)',lines:[
      {code:'1-2100',debit:18250000,credit:0},{code:'1-1101',debit:0,credit:18250000}],evidence:true},
    {id:'JU-S07',date:D,ref:'REKAP-ASET',desc:'Beli Peralatan - Oven (aset tetap / capex)',lines:[
      {code:'1-2102',debit:15950000,credit:0},{code:'1-1101',debit:0,credit:15950000}],evidence:true},
    // BEBAN USAHA
    {id:'JU-S08',date:D,ref:'REKAP-GAJI',desc:'Beban gaji & upah karyawan',lines:[
      {code:'6-1100',debit:9821000,credit:0},{code:'1-1101',debit:0,credit:9821000}],evidence:true},
    {id:'JU-S09',date:D,ref:'REKAP-PROMO',desc:'Beban pemasaran & promosi (ads)',lines:[
      {code:'6-1200',debit:2108462,credit:0},{code:'1-1101',debit:0,credit:2108462}],evidence:true},
    {id:'JU-S10',date:D,ref:'REKAP-UTIL',desc:'Beban utilitas (listrik, gas, air)',lines:[

    {id:'JU-S11',date:D,ref:'REKAP-KIRIM',desc:'Beban pengiriman (ongkir/Lalamove)',lines:[

// Data rekonsiliasi per-bank (dari sheet Ringkasan Klasifikasi, selisih = 0)
function seedRekon(){

function loadDB(){

function saveLocal(){ localStorage.setItem(LS_KEY,JSON.stringify(DB)); }
function saveDB(){ saveLocal(); scheduleCloudPush(); }
function setCloudStatus(s){
  const el=document.getElementById('cloudStatus'); if(!el) return;
  const m={local:['💾 Lokal','#9ca3af'],connecting:['☁️ Menyambung…','#fbbf24'],cloud:['☁️ Tersinkron','#4ade80'],error:['⚠️ Cloud error','#f87171']};
  const v=m[s]||m.local; el.textContent=v[0]; el.style.color=v[1]; el.style.borderColor=v[1]+'88';
}
function scheduleCloudPush(){
  if(!cloudReady || suppressCloudWrite || !fsDoc) return;
  const payload=JSON.stringify(DB);
  if(payload===lastPushed) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    lastPushed=payload;
    fsDoc.set({payload, updated: firebase.firestore.FieldValue.serverTimestamp()})
      .then(()=>setCloudStatus('cloud')).catch(e=>{console.error(e);setCloudStatus('error');});
  }, 800);
}
function pushCloud(){
  if(!fsDoc) return;
  const payload=JSON.stringify(DB); lastPushed=payload;
  fsDoc.set({payload, updated: firebase.firestore.FieldValue.serverTimestamp()})
    .then(()=>setCloudStatus('cloud')).catch(e=>{console.error(e);setCloudStatus('error');});
}
async function initCloud(){
  if(typeof firebase==='undefined' || !FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.indexOf('PASTE')===0){ setCloudStatus('local'); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db_fs=firebase.firestore();
    try{ await db_fs.enablePersistence({synchronizeTabs:true}); }catch(e){}
    setCloudStatus('connecting');
    await firebase.auth().signInAnonymously();
    fsDoc=db_fs.collection('workspaces').doc(WORKSPACE_ID);
    fsDoc.onSnapshot(snap=>{
      if(snap.metadata.hasPendingWrites) return;       // abaikan gema tulisan sendiri
      if(snap.exists && snap.data() && snap.data().payload){
        try{ DB=JSON.parse(snap.data().payload); }catch(e){ return; }
        cloudReady=true; lastPushed=JSON.stringify(DB);
        suppressCloudWrite=true; saveLocal(); renderAll(); suppressCloudWrite=false;
      } else {
        cloudReady=true; lastPushed=null; pushCloud();  // cloud kosong → unggah data awal
      }
      setCloudStatus('cloud');
    }, err=>{ console.error('Firestore:',err); setCloudStatus('error'); });
  }catch(e){ console.error('Cloud init:',e); setCloudStatus('error'); }
}

// Saldo akun (cumulative s/d akhir periode) -> bernilai positif di sisi normalnya
function ledgerBalance(code,cumulative=true){
  let d=0,k=0;
  DB.journal.forEach(j=>{
    const ok = cumulative ? upToPeriod(j.date) : inPeriod(j.date);
    if(!ok) return;
    j.lines.forEach(l=>{ if(l.code===code){ d+=(+l.debit||0); k+=(+l.credit||0); } });
  });
  const a=acc(code);
  const bal = a.normal==='D' ? d-k : k-d;
  return {debit:d,credit:k,balance:bal};
}
// Mutasi periode berjalan untuk akun (untuk Laba/Rugi & arus kas)
function periodMovement(code){ return ledgerBalance(code,false).balance; }

function buildIncomeStatement(){
  const rev=DB.coa.filter(a=>a.type==='pendapatan').map(a=>({...a,amt:periodMovement(a.code)}));
  const hpp=DB.coa.filter(a=>a.type==='hpp').map(a=>({...a,amt:periodMovement(a.code)}));
  const exp=DB.coa.filter(a=>a.type==='beban').map(a=>({...a,amt:periodMovement(a.code)}));
  const sumRev=rev.reduce((s,x)=>s+x.amt,0);
  const sumHpp=hpp.reduce((s,x)=>s+x.amt,0);
  const gross=sumRev-sumHpp;
  const expUsaha=exp.filter(a=>a.group==='Beban Usaha');
  const expLain=exp.filter(a=>a.group!=='Beban Usaha' && a.group!=='Pajak');
  const expPajak=exp.filter(a=>a.group==='Pajak');
  const sumExpUsaha=expUsaha.reduce((s,x)=>s+x.amt,0);
  const labaUsaha=gross-sumExpUsaha;
  const sumExpLain=expLain.reduce((s,x)=>s+x.amt,0);
  const labaSblmPajak=labaUsaha-sumExpLain;
  const sumPajak=expPajak.reduce((s,x)=>s+x.amt,0);
  const labaNeto=labaSblmPajak-sumPajak;
  return {rev,hpp,expUsaha,expLain,expPajak,sumRev,sumHpp,gross,sumExpUsaha,labaUsaha,sumExpLain,labaSblmPajak,sumPajak,labaNeto};
}

function buildBalanceSheet(){
  const is=buildIncomeStatement();
  const asetLancarGroups=['Kas dan Setara Kas','Aset Lancar Lainnya','Piutang Usaha','Persediaan','Beban Dibayar Dimuka'];
  const lancar=DB.coa.filter(a=>asetLancarGroups.includes(a.group)).map(a=>({...a,bal:ledgerBalance(a.code).balance}));
  const tetap=DB.coa.filter(a=>a.group==='Aset Tetap').map(a=>({...a,bal:ledgerBalance(a.code).balance}));
  const liabPendek=DB.coa.filter(a=>a.group==='Liabilitas Jangka Pendek').map(a=>({...a,bal:ledgerBalance(a.code).balance}));
  const liabPanjang=DB.coa.filter(a=>a.group==='Liabilitas Jangka Panjang').map(a=>({...a,bal:ledgerBalance(a.code).balance}));
  const sumLancar=lancar.reduce((s,x)=>s+x.bal,0);
  const sumTetap=tetap.reduce((s,x)=>s+x.bal,0); // akum penyusutan normal K → balance negatif, otomatis mengurangi
  const totalAset=sumLancar+sumTetap;
  const sumLiabPendek=liabPendek.reduce((s,x)=>s+x.bal,0);
  const sumLiabPanjang=liabPanjang.reduce((s,x)=>s+x.bal,0);
  const totalLiab=sumLiabPendek+sumLiabPanjang;
  // Ekuitas: modal + saldo laba awal - prive + laba neto periode (laba berjalan blm di-closing)
  const modal=ledgerBalance('3-1100').balance;
  const labaAwal=ledgerBalance('3-1300').balance;
  const prive=ledgerBalance('3-1200').balance; // normal D, balance positif
  const labaNeto=is.labaNeto;
  const totalEkuitas=modal+labaAwal-prive+labaNeto;
  const totalLiabEkuitas=totalLiab+totalEkuitas;
  return {lancar,tetap,liabPendek,liabPanjang,sumLancar,sumTetap,totalAset,sumLiabPendek,sumLiabPanjang,totalLiab,
          modal,labaAwal,prive,labaNeto,totalEkuitas,totalLiabEkuitas,selisih:totalAset-totalLiabEkuitas};
}

// Arus kas: mutasi periode pada akun cash:true (metode langsung) + jembatan laba->kas
function buildCashFlow(){
  const cashAccts=DB.coa.filter(a=>a.cash);
  let opening=0,closing=0;
  cashAccts.forEach(a=>{
    const cum=ledgerBalance(a.code).balance;
    const per=periodMovement(a.code);
    closing+=cum; opening+=(cum-per);
  });
  const netChange=closing-opening;
  // Klasifikasi mutasi kas berdasar lawan akun pada tiap baris jurnal periode berjalan
  // (untuk tiap transaksi yg menyentuh kas, kelompokkan ke operasi/investasi/pendanaan)
  const cat={operasi:{}, investasi:{}, pendanaan:{}};
  DB.journal.forEach(j=>{
    if(!inPeriod(j.date)) return;
    const cashLines=j.lines.filter(l=>acc(l.code).cash);
    const otherLines=j.lines.filter(l=>!acc(l.code).cash);
    const cashFlow=cashLines.reduce((s,l)=>s+(+l.debit||0)-(+l.credit||0),0); // + = kas masuk
    if(Math.abs(cashFlow)<0.005) return; // transfer antar-kas: tak ada efek kas neto
    // tentukan kelompok dari lawan akun dominan
    otherLines.forEach(l=>{
      const a=acc(l.code); const amt=(+l.debit||0)+(+l.credit||0);
      let grp='operasi';
      if(a.group==='Aset Tetap') grp='investasi';
      else if(a.type==='ekuitas'||a.type==='prive'||a.group==='Liabilitas Jangka Panjang') grp='pendanaan';
      else grp='operasi';
      const sign=cashFlow>0?1:-1;
      cat[grp][a.name]=(cat[grp][a.name]||0)+sign*amt;
    });
  });
  return {opening,closing,netChange,cat};
}

// Jembatan Laba -> Kas (mengapa laba ≠ uang tunai)
function buildBridge(){
  const is=buildIncomeStatement();
  const cf=buildCashFlow();
  const items=[];
  // Modal disetor (pendanaan masuk)
  const modalIn=periodMovement('3-1100'); if(Math.abs(modalIn)>0.005) items.push({lab:'(+) Setoran modal pemilik',why:'Pendanaan, bukan pendapatan',amt:modalIn});
  // Utang jaminan / liabilitas naik
  ['2-1400','2-1100','2-1200','2-1300','2-2100'].forEach(c=>{const m=periodMovement(c); if(Math.abs(m)>0.005) items.push({lab:(m>0?'(+) ':'(−) ')+'Perubahan '+accName(c),why:'Arus utang/titipan, bukan laba',amt:m});});
  // Capex (investasi keluar)
  DB.coa.filter(a=>a.group==='Aset Tetap'&&a.type==='aset').forEach(a=>{const m=periodMovement(a.code); if(Math.abs(m)>0.005) items.push({lab:'(−) Beli '+a.name,why:'Belanja aset (capex), tidak masuk Laba/Rugi',amt:-m});});
  // Prive (pendanaan keluar)
  const prive=periodMovement('3-1200'); if(Math.abs(prive)>0.005) items.push({lab:'(−) Prive (penarikan pemilik)',why:'Ambil dana pribadi, bukan beban usaha',amt:-prive});
  // Selisih kas belum teridentifikasi (suspense) — uang keluar ke pos yang perlu dicek
  const susp=periodMovement('1-1190'); if(Math.abs(susp)>0.005) items.push({lab:'(−) Selisih kas belum teridentifikasi',why:'⚠ Perlu dicek: kas outlet / modal perlu konfirmasi',amt:-susp});
  // Perpindahan ke e-wallet & perubahan persediaan/piutang (non-cash working capital di luar kas)
  // Perubahan persediaan
  ['1-1300','1-1310'].forEach(c=>{const m=periodMovement(c); if(Math.abs(m)>0.005) items.push({lab:(m>0?'(−) ':'(+) ')+'Perubahan '+accName(c),why:'Uang terikat di persediaan',amt:-m});});
  ['1-1200'].forEach(c=>{const m=periodMovement(c); if(Math.abs(m)>0.005) items.push({lab:(m>0?'(−) ':'(+) ')+'Perubahan Piutang Usaha',why:'Penjualan belum jadi uang',amt:-m});});
  const start=is.labaNeto;
  const calcEnd=start+items.reduce((s,x)=>s+x.amt,0);
  return {start,items,end:cf.netChange,calcEnd};
}

function postEntry(entry){
  const d=entry.lines.reduce((s,l)=>s+(+l.debit||0),0), k=entry.lines.reduce((s,l)=>s+(+l.credit||0),0);
  if(Math.abs(d-k)>0.5){ toast('❌ Gagal: Debit ('+rp(d)+') ≠ Kredit ('+rp(k)+')'); return false; }
  DB.journal.push(entry); renderAll(); return true;
}
function submitMasuk(e){ e.preventDefault();
  const t=val('m_type'),cash=val('m_cash'),amt=+val('m_amt'),date=val('m_date');
  const ref=val('m_ref')||nextRef('IN'); const desc=val('m_desc')||accName(t);
  const lines=[{code:cash,debit:amt,credit:0},{code:t,debit:0,credit:amt}];
  if(postEntry({id:ref,date,ref,desc,lines,evidence:document.getElementById('m_ev').checked})){ toast('✓ Pemasukan tersimpan: '+rp(amt)); e.target.reset(); document.getElementById('m_date').value=today(); }
}
function submitKeluar(e){ e.preventDefault();
  const a=val('k_acct'),cash=val('k_cash'),amt=+val('k_amt'),date=val('k_date');
  const ref=val('k_ref')||nextRef('OUT'); const desc=val('k_desc')||accName(a);
  const lines=[{code:a,debit:amt,credit:0},{code:cash,debit:0,credit:amt}];
  if(postEntry({id:ref,date,ref,desc,lines,evidence:document.getElementById('k_ev').checked})){ toast('✓ Pengeluaran tersimpan: '+rp(amt)); e.target.reset(); document.getElementById('k_date').value=today(); }
}
function submitPrive(e){ e.preventDefault();
  const cash=val('p_cash'),amt=+val('p_amt'),date=val('p_date');
  const ref=val('p_ref')||nextRef('PRV'); const desc=val('p_desc')||'Prive penarikan pemilik';
  const lines=[{code:'3-1200',debit:amt,credit:0},{code:cash,debit:0,credit:amt}];
  if(postEntry({id:ref,date,ref,desc,lines,evidence:true})){ toast('✓ Prive dicatat: '+rp(amt)+' (tidak mengurangi laba)'); e.target.reset(); document.getElementById('p_date').value=today(); }
}
let jlines=[];
function addJLine(){ jlines.push({code:'',debit:'',credit:''}); renderJLines(); }
function renderJLines(){
  const box=document.getElementById('x_lines'); if(!box)return;
  box.innerHTML=jlines.map((l,i)=>`<div class="jline">
    <select onchange="jlines[${i}].code=this.value;checkJBal()"><option value="">— pilih akun —</option>${acctOptions(()=>true,l.code)}</select>
    <input type="number" placeholder="Debit" step="any" value="${l.debit}" oninput="jlines[${i}].debit=this.value;checkJBal()">
    <input type="number" placeholder="Kredit" step="any" value="${l.credit}" oninput="jlines[${i}].credit=this.value;checkJBal()">
    <button type="button" class="btn danger sm" onclick="jlines.splice(${i},1);renderJLines()">✕</button>
  </div>`).join('');
  checkJBal();
}
function checkJBal(){
  const d=jlines.reduce((s,l)=>s+(+l.debit||0),0),k=jlines.reduce((s,l)=>s+(+l.credit||0),0);
  const b=document.getElementById('x_bal'); if(!b)return;
  const ok=Math.abs(d-k)<0.5 && d>0;
  b.className='balcheck '+(ok?'ok':'bad');
  b.textContent=ok?`✓ Balance — Debit = Kredit = ${rp(d)}`:`Debit ${rp(d)} · Kredit ${rp(k)} · Selisih ${rp(d-k)}`;
}
function submitManual(e){ e.preventDefault();
  const date=val('x_date'); const ref=val('x_ref')||nextRef('JU'); const desc=val('x_desc')||'Jurnal manual';
  const lines=jlines.filter(l=>l.code&&((+l.debit||0)||(+l.credit||0))).map(l=>({code:l.code,debit:+l.debit||0,credit:+l.credit||0}));
  if(lines.length<2){ toast('Minimal 2 baris.'); return; }
  if(postEntry({id:ref,date,ref,desc,lines,evidence:true})){ toast('✓ Jurnal diposting.'); jlines=[{code:'',debit:'',credit:''},{code:'',debit:'',credit:''}]; renderJLines(); val2('x_desc',''); }
}
const val=id=>document.getElementById(id).value;
const val2=(id,v)=>document.getElementById(id).value=v;

let jurnalFilter='all';
function jurnalMonthOptions(){
  const set={};
  DB.journal.forEach(j=>{ const d=new Date(j.date); set[d.getFullYear()+'-'+d.getMonth()]={y:d.getFullYear(),m:d.getMonth()}; });
  const arr=Object.values(set).sort((a,b)=>new Date(a.y,a.m)-new Date(b.y,b.m));
  let opts=`<option value="all" ${jurnalFilter==='all'?'selected':''}>Semua periode</option>`;
  arr.forEach(o=>{ const key=o.y+'-'+o.m; opts+=`<option value="${key}" ${jurnalFilter===key?'selected':''}>${MONTHS[o.m]} ${o.y}</option>`; });
  return opts;
}
function setJurnalFilter(v){ jurnalFilter=v; renderJurnal(); }
function jurnalInFilter(dateStr){
  if(jurnalFilter==='all') return true;
  const [y,m]=jurnalFilter.split('-').map(Number); const d=new Date(dateStr);
  return d.getFullYear()===y && d.getMonth()===m;
}
function renderJurnal(){
  const el=document.getElementById('page-jurnal');
  const rows=DB.journal.slice().filter(j=>jurnalInFilter(j.date)).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let body='';
  rows.forEach(j=>{
    const d=j.lines.reduce((s,l)=>s+(+l.debit||0),0), k=j.lines.reduce((s,l)=>s+(+l.credit||0),0);
    const bad=Math.abs(d-k)>0.5;
    j.lines.forEach((l,idx)=>{
      body+=`<tr class="${bad?'flagrow bad':''}">
        ${idx===0?`<td rowspan="${j.lines.length}">${fmtDate(j.date)}</td><td rowspan="${j.lines.length}"><b>${j.ref||j.id}</b><div style="font-size:11px;color:#888">${j.desc||''}</div>${j.evidence===false?'<span class="miniflag">⚠ tanpa bukti</span>':''}</td>`:''}
        <td>${l.debit?'':'&nbsp;&nbsp;&nbsp;&nbsp;'}${l.code} · ${accName(l.code)}</td>
        <td class="num">${l.debit?rp(l.debit):''}</td>
        <td class="num">${l.credit?rp(l.credit):''}</td>
        ${idx===0?`<td rowspan="${j.lines.length}"><button class="btn danger sm" onclick="delEntry('${j.id}')">Hapus</button></td>`:''}
      </tr>`;
    });
  });
  const totD=rows.reduce((s,j)=>s+j.lines.reduce((a,l)=>a+(+l.debit||0),0),0);
  const totK=rows.reduce((s,j)=>s+j.lines.reduce((a,l)=>a+(+l.credit||0),0),0);
  const filterLbl=jurnalFilter==='all'?'seluruh periode':MONTHS[+jurnalFilter.split('-')[1]]+' '+jurnalFilter.split('-')[0];
  el.innerHTML=`
  <h2 class="title">Jurnal Umum</h2>
  <p class="pageintro">Tiap entri harus Debit = Kredit. Baris merah = tidak balance / perlu diperiksa.</p>
  <div class="card">
    <div class="frow" style="align-items:flex-end;margin-bottom:6px">
      <div class="fld" style="max-width:240px"><label>🔎 Filter Bulan</label>
        <select onchange="setJurnalFilter(this.value)">${jurnalMonthOptions()}</select>
      </div>
      <div style="color:var(--muted);font-size:12px;padding-bottom:9px">Menampilkan: <b>${filterLbl}</b></div>
    </div>
    <div class="statgrid" style="margin-bottom:14px">
      <div class="stat"><div class="l">Jumlah Entri</div><div class="n">${rows.length}</div></div>
      <div class="stat"><div class="l">Total Debit</div><div class="n">${rpShort(totD)}</div></div>
      <div class="stat"><div class="l">Total Kredit</div><div class="n">${rpShort(totK)}</div></div>
      <div class="stat"><div class="l">Status</div><div class="n ${Math.abs(totD-totK)<1?'pos':'neg'}">${Math.abs(totD-totK)<1?'✓ Balance':'✗ Selisih'}</div></div>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Tanggal</th><th>Bukti / Keterangan</th><th>Akun</th><th class="num">Debit</th><th class="num">Kredit</th><th></th></tr></thead>
      <tbody>${body||'<tr><td colspan="6" class="empty">Belum ada transaksi.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}
function delEntry(id){ if(confirm('Hapus jurnal ini?')){ DB.journal=DB.journal.filter(j=>j.id!==id); renderAll(); toast('Jurnal dihapus.'); } }
function fmtDate(s){ const d=new Date(s); return d.getDate()+' '+MONTHS[d.getMonth()].slice(0,3)+' '+d.getFullYear(); }

      <div class="fld"><label>Kas?</label><select id="c_cash"><option value="false">Bukan</option><option value="true">Ya (setara kas)</option></select></div>
      <div class="fld" style="justify-content:flex-end"><button class="btn" type="submit">+ Tambah</button></div>

function addAccount(e){ e.preventDefault();

  renderAll(); toast('Akun ditambahkan: '+code); e.target.reset();
}

  el.innerHTML=`
  <h2 class="title">Laporan Keuangan — ${periodLbl}</h2>

function rowHTML(lab,val,cls=''){ return `<div class="row ${cls}"><div>${lab}</div><div class="v ${val<0?'neg':''}">${rp(val)}</div></div>`; }
function incomeHTML(){
  const is=buildIncomeStatement(); let h='<div class="report">';
  h+='<div class="row head">Pendapatan</div>';
  is.rev.forEach(a=>{ if(a.amt||a.code==='4-1100') h+=rowHTML(a.name,a.amt,'indent'); });
  h+=rowHTML('Jumlah Pendapatan',is.sumRev,'sub');
  h+='<div class="row head">Beban Pokok Penjualan</div>';
  is.hpp.forEach(a=>h+=rowHTML(a.name,a.amt,'indent'));
  h+=rowHTML('LABA BRUTO',is.gross,'sub');
  h+='<div class="row head">Beban Usaha</div>';
  is.expUsaha.forEach(a=>{ if(a.amt) h+=rowHTML(a.name,a.amt,'indent'); });
  h+=rowHTML('Jumlah Beban Usaha',is.sumExpUsaha,'sub');
  h+=rowHTML('LABA USAHA',is.labaUsaha,'sub');
  h+='<div class="row head">Pendapatan (Beban) Lain-lain</div>';
  is.expLain.forEach(a=>{ if(a.amt) h+=rowHTML(a.name,-a.amt,'indent'); });
  h+=rowHTML('Laba Sebelum Pajak',is.labaSblmPajak,'sub');
  is.expPajak.forEach(a=>{ if(a.amt) h+=rowHTML(a.name,a.amt,'indent'); });
  h+=rowHTML('LABA NETO',is.labaNeto,'total');
  h+='</div>';
  return h;
}
function equityHTML(){
  const bs=buildBalanceSheet(); let h='<div class="report">';
  h+=rowHTML('Modal Disetor',bs.modal);
  h+=rowHTML('Saldo Laba Awal Periode',bs.labaAwal);
  h+=rowHTML('Saldo Awal Ekuitas',bs.modal+bs.labaAwal,'sub');
  h+=rowHTML('(+) Laba Neto Periode Berjalan',bs.labaNeto);
  h+=rowHTML('(−) Prive (Penarikan Pemilik)',-bs.prive);

  return h;
}
function balanceHTML(){

  let L='<div class="report"><div class="row head">ASET</div>';
  L+='<div class="row sub"><div>Aset Lancar</div><div></div></div>';
  bs.lancar.forEach(a=>{ if(Math.abs(a.bal)>0.005) L+=rowHTML(a.name,a.bal,'indent'); });
  L+=rowHTML('Jumlah Aset Lancar',bs.sumLancar,'sub');
  L+='<div class="row sub"><div>Aset Tetap</div><div></div></div>';
  bs.tetap.forEach(a=>{ if(Math.abs(a.bal)>0.005) L+=rowHTML(a.name,a.bal,'indent'); });
  L+=rowHTML('Jumlah Aset Tetap (Nilai Buku)',bs.sumTetap,'sub');
  L+=rowHTML('JUMLAH ASET',bs.totalAset,'total')+'</div>';
  let R='<div class="report"><div class="row head">LIABILITAS & EKUITAS</div>';
  R+='<div class="row sub"><div>Liabilitas Jangka Pendek</div><div></div></div>';
  bs.liabPendek.forEach(a=>{ if(Math.abs(a.bal)>0.005) R+=rowHTML(a.name,a.bal,'indent'); });
  R+=rowHTML('Jumlah Liabilitas Jk. Pendek',bs.sumLiabPendek,'sub');
  bs.liabPanjang.forEach(a=>{ if(Math.abs(a.bal)>0.005) R+=rowHTML(a.name,a.bal,'indent'); });
  R+=rowHTML('JUMLAH LIABILITAS',bs.totalLiab,'sub');
  R+='<div class="row sub"><div>Ekuitas</div><div></div></div>';
  R+=rowHTML('Total Ekuitas',bs.totalEkuitas,'indent');
  R+=rowHTML('JUMLAH LIABILITAS & EKUITAS',bs.totalLiabEkuitas,'total')+'</div>';
  const check=`<div class="balcheck ${Math.abs(bs.selisih)<1?'ok':'bad'}" style="margin-top:14px">${Math.abs(bs.selisih)<1?'✓ BALANCE — Aset = Liabilitas + Ekuitas':'✗ TIDAK balance, selisih '+rp(bs.selisih)}</div>`;
  return `<div class="grid2 even">${L}${R}</div>${check}`;
}
function cashflowHTML(){
  const cf=buildCashFlow(); const br=buildBridge();
  const sec=(title,obj)=>{ let h=`<div class="row sub"><div>${title}</div><div></div></div>`; let sum=0;
    Object.entries(obj).forEach(([k,v])=>{ if(Math.abs(v)>0.005){ h+=rowHTML(k,v,'indent'); sum+=v; } });
    if(!Object.keys(obj).length) h+='<div class="row indent" style="color:#aaa">—</div>';
    return {h,sum}; };
  const o=sec('Arus Kas dari Aktivitas Operasi',cf.cat.operasi);
  const i=sec('Arus Kas dari Aktivitas Investasi',cf.cat.investasi);
  const f=sec('Arus Kas dari Aktivitas Pendanaan',cf.cat.pendanaan);
  let h='<div class="report" style="max-width:760px">';
  h+='<div class="note blue" style="margin:0 0 12px">Metode langsung: arus kas dikelompokkan dari lawan-akun tiap transaksi. <b>Operasi</b> = jual-beli & beban harian · <b>Investasi</b> = beli/jual aset tetap · <b>Pendanaan</b> = modal, prive, pinjaman.</div>';
  h+=o.h+rowHTML('Kas Neto Operasi',o.sum,'sub');
  h+=i.h+rowHTML('Kas Neto Investasi',i.sum,'sub');
  h+=f.h+rowHTML('Kas Neto Pendanaan',f.sum,'sub');
  h+=rowHTML('KENAIKAN (PENURUNAN) KAS BERSIH',cf.netChange,'sub');
  h+=rowHTML('Kas & Setara Kas Awal Periode',cf.opening);
  h+=rowHTML('KAS & SETARA KAS AKHIR PERIODE',cf.closing,'total');
  h+='</div>';
  // Jembatan
  h+='<h3 style="margin-top:22px">🌉 Jembatan: Mengapa Laba ≠ Uang Tunai</h3><div class="bridge" style="max-width:760px">'+renderBridgeHTML(br)+'</div>';
  return h;
}

/* ============================================================
   BAGIAN 12 — REKONSILIASI & AUDIT
   ============================================================ */
function renderRekon(){
  const el=document.getElementById('page-rekon');
  // Rekonsiliasi per bank
  let recRows=''; let totKoran=0,totBuku=0,totSel=0;
  DB.rekon.forEach((r,i)=>{
    const akhir=r.awal+r.masuk-r.keluar; const sel=r.koran-akhir;
    totKoran+=r.koran; totBuku+=akhir; totSel+=sel;
    recRows+=`<tr class="${Math.abs(sel)>1?'flagrow bad':''}">
      <td><b>${r.bank}</b></td>
      <td class="num">${rp(r.awal)}</td>
      <td class="num">${rp(r.masuk)}</td>
      <td class="num">${rp(r.keluar)}</td>
      <td class="num">${rp(akhir)}</td>
      <td class="num"><input type="number" step="any" value="${r.koran}" style="width:140px;text-align:right" onchange="DB.rekon[${i}].koran=+this.value;renderRekon();saveDB()"></td>
      <td class="num ${Math.abs(sel)<1?'pos':'neg'}"><b>${rp(sel)}</b></td>
    </tr>`;
  });
  const selTot=totSel;
  // Flag transaksi mencurigakan
  const flags=auditFlags();
  let flagRows=flags.map(f=>`<tr class="flagrow ${f.sev==='high'?'bad':''}">
    <td>${fmtDate(f.date)}</td><td><b>${f.ref}</b></td><td>${f.desc}</td>
    <td class="num">${rp(f.amt)}</td><td><span class="pill ${f.sev==='high'?'out':'warn'}">${f.reason}</span></td>
  </tr>`).join('');

  el.innerHTML=`
  <h2 class="title">Rekonsiliasi Kas & Audit Anti-Kebocoran</h2>
  <p class="pageintro">Bandingkan saldo menurut pembukuan vs rekening koran riil, dan tandai transaksi yang perlu diperiksa.</p>

  <div class="card">
    <h3>A. Rekonsiliasi Saldo Bank — ${MONTHS[SEL.month]} ${SEL.year} <span class="tag">selisih harus 0</span></h3>
    <div class="note">Saldo Akhir (buku) = Saldo Awal + Masuk − Keluar. <b>Selisih</b> = Rek. Koran − Saldo Akhir. Jika selisih ≠ 0, ada transaksi yang belum/salah dicatat. Edit kolom "Rek. Koran" sesuai mutasi bank Anda.</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Bank</th><th class="num">Saldo Awal</th><th class="num">Masuk</th><th class="num">Keluar</th><th class="num">Saldo Akhir (Buku)</th><th class="num">Rek. Koran</th><th class="num">Selisih</th></tr></thead>
      <tbody>${recRows}</tbody>
      <tfoot><tr style="font-weight:800;background:#fdf6e9"><td>TOTAL</td><td class="num">${rp(DB.rekon.reduce((s,r)=>s+r.awal,0))}</td><td class="num">${rp(DB.rekon.reduce((s,r)=>s+r.masuk,0))}</td><td class="num">${rp(DB.rekon.reduce((s,r)=>s+r.keluar,0))}</td><td class="num">${rp(totBuku)}</td><td class="num">${rp(totKoran)}</td><td class="num ${Math.abs(selTot)<1?'pos':'neg'}">${rp(selTot)}</td></tr></tfoot>
    </table></div>
    <div class="balcheck ${Math.abs(selTot)<1?'ok':'bad'}" style="margin-top:12px">${Math.abs(selTot)<1?'✓ Seluruh mutasi tercatat lengkap & menutup ke rekening koran (selisih = 0).':'✗ Ada selisih '+rp(selTot)+' — telusuri bank yang ditandai merah.'}</div>
    <div class="note" style="margin-top:12px"><b>Belum termasuk:</b> saldo e-wallet (top-up ${rp(periodMovement('1-1102'))}) & kas tunai outlet di luar rekening. Tambahkan baris bila perlu lewat tombol di bawah.</div>
    <button class="btn sec sm" onclick="addRekonRow()">+ Tambah Baris Bank/Kas</button>
  </div>

  <div class="card">
    <h3>B. Penanda Transaksi Perlu Diperiksa <span class="tag">${flags.length} temuan</span></h3>
    <div class="note red">Daftar otomatis transaksi berisiko "kebocoran": tanpa bukti, masih asumsi, nominal janggal, atau jurnal tidak balance.</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Tanggal</th><th>Bukti</th><th>Keterangan</th><th class="num">Nilai</th><th>Alasan</th></tr></thead>
      <tbody>${flagRows||'<tr><td colspan="5" class="empty">✓ Tidak ada transaksi mencurigakan.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}
function addRekonRow(){ const nama=prompt('Nama bank/kas:'); if(!nama)return; const awal=+prompt('Saldo awal:')||0; DB.rekon.push({bank:nama,code:'',awal,masuk:0,keluar:0,akhir:awal,koran:awal}); saveDB(); renderRekon(); }
function auditFlags(){
  const out=[];
  DB.journal.forEach(j=>{
    const d=j.lines.reduce((s,l)=>s+(+l.debit||0),0),k=j.lines.reduce((s,l)=>s+(+l.credit||0),0);
    const amt=Math.max(d,k);
    if(Math.abs(d-k)>0.5) out.push({date:j.date,ref:j.ref||j.id,desc:j.desc,amt,reason:'Tidak balance',sev:'high'});
    else if(j.evidence===false) out.push({date:j.date,ref:j.ref||j.id,desc:j.desc,amt,reason:'Tanpa bukti / asumsi',sev:'high'});
    else if(j.note&&/asumsi|konfirmasi/i.test(j.note)) out.push({date:j.date,ref:j.ref||j.id,desc:j.desc,amt,reason:'Perlu konfirmasi',sev:'med'});
    if(j.lines.some(l=>(+l.debit||0)<0||(+l.credit||0)<0)) out.push({date:j.date,ref:j.ref||j.id,desc:j.desc,amt,reason:'Nilai negatif',sev:'high'});
  });
  return out.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

/* ============================================================
   BAGIAN 13 — EXPORT / IMPORT
   ============================================================ */
function exportJSON(){ const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='honeybr_backup_'+today()+'.json'; a.click(); toast('Backup diunduh.'); }
function importJSON(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ DB=JSON.parse(r.result); saveDB(); renderAll(); toast('Data dipulihkan dari backup.'); }catch(err){ toast('File tidak valid.'); } }; r.readAsText(f); }
function exportCSV(){
  let csv='Tanggal,No Bukti,Keterangan,Kode Akun,Nama Akun,Debit,Kredit\n';
  DB.journal.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(j=>{
    j.lines.forEach(l=>{ csv+=`${j.date},"${j.ref||j.id}","${(j.desc||'').replace(/"/g,'""')}",${l.code},"${accName(l.code)}",${l.debit||0},${l.credit||0}\n`; });
  });
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='jurnal_honeybr_'+today()+'.csv'; a.click(); toast('Jurnal diekspor ke CSV (buka di Excel).');
}

loadDB(); initPeriod(); renderAll(); initCloud();
